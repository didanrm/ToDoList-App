name: Build and release APK

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Build and test
        run: gradle test assembleDebug -PversionName=${GITHUB_REF_NAME} -PversionCode=${GITHUB_RUN_NUMBER} --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk Rapi-${GITHUB_REF_NAME}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Rapi-${{ github.ref_name }}.apk
          generate_release_notes: true
